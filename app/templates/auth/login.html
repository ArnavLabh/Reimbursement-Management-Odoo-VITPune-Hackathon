{% extends "base.html" %}
{% block title %}Login — ReimburseFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <svg class="auth-logo" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="16" width="48" height="40" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
        <path d="M16 16V12C16 9.79086 17.7909 8 20 8H44C46.2091 8 48 9.79086 48 12V16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <circle cx="32" cy="36" r="6" fill="#2563eb"/>
        <path d="M24 48H40" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h1>ReimburseFlow</h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div class="form-group form-check">
        <input type="checkbox" id="remember" name="remember" />
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div class="auth-footer">
      No account yet?
      {% if no_admin %}
        <a href="{{ url_for('auth.signup') }}">Set up your company</a>
      {% else %}
        Contact your administrator.
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}

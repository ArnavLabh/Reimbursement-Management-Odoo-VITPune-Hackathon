{% extends "base.html" %}
{% block title %}Login — ReimburseFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">💼</div>
      <h1>ReimburseFlow</h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div class="form-group form-check">
        <input type="checkbox" id="remember" name="remember" />
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div class="auth-footer">
      No account yet?
      {% if no_admin %}
        <a href="{{ url_for('auth.signup') }}">Set up your company</a>
      {% else %}
        Contact your administrator.
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Company Setup — ReimburseFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <svg class="auth-logo" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="20" width="40" height="32" rx="3" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <rect x="20" y="12" width="24" height="8" rx="2" fill="#2563eb"/>
        <path d="M20 32H44M20 40H44" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <h1>Set Up Your Company</h1>
      <p>Create the admin account and your company profile</p>
    </div>

    <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form">
      <div class="form-section-label">Admin Account</div>

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@company.com" required />
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" />
      </div>

      <div class="form-section-label" style="margin-top:1.5rem;">Company Details</div>

      <div class="form-group">
        <label for="company_name">Company Name</label>
        <input type="text" id="company_name" name="company_name" placeholder="Acme Corp" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="country_select">Country</label>
          <select id="country_select" name="country" required>
            <option value="">Loading countries…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="currency_code">Default Currency</label>
          <input type="text" id="currency_code" name="currency_code" placeholder="USD" required />
          <input type="hidden" id="currency_symbol" name="currency_symbol" value="$" />
          <small class="form-hint" id="currency_hint">Auto-filled from country selection — you can edit it</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.5rem;">Create Company &amp; Admin</button>
    </form>
  </div>
</div>

<script>
(async () => {
  const countrySelect = document.getElementById("country_select");
  const currencyCodeInput = document.getElementById("currency_code");
  const currencySymbolInput = document.getElementById("currency_symbol");
  const currencyHint = document.getElementById("currency_hint");

  const SYMBOL_MAP = {
    USD:"$",EUR:"€",GBP:"£",INR:"₹",JPY:"¥",CNY:"¥",AUD:"A$",CAD:"C$",
    CHF:"Fr",KRW:"₩",BRL:"R$",MXN:"$",SGD:"S$",HKD:"HK$",NOK:"kr",
    SEK:"kr",DKK:"kr",NZD:"NZ$",ZAR:"R",RUB:"₽",TRY:"₺",AED:"د.إ",
    SAR:"﷼",THB:"฿",IDR:"Rp",MYR:"RM",PHP:"₱",VND:"₫",PKR:"₨",BDT:"৳",
  };

  try {
    const resp = await fetch("https://restcountries.com/v3.1/all?fields=name,currencies");
    const countries = await resp.json();
    countries.sort((a, b) => a.name.common.localeCompare(b.name.common));

    countrySelect.innerHTML = '<option value="">Select a country</option>';
    countries.forEach(c => {
      const currKeys = Object.keys(c.currencies || {});
      if (!currKeys.length) return;
      const opt = document.createElement("option");
      opt.value = c.name.common;
      opt.dataset.currency = currKeys[0];
      opt.textContent = c.name.common;
      countrySelect.appendChild(opt);
    });

    countrySelect.addEventListener("change", () => {
      const selected = countrySelect.options[countrySelect.selectedIndex];
      const code = selected.dataset.currency || "USD";
      const symbol = SYMBOL_MAP[code] || code;
      currencyCodeInput.value = code;
      currencySymbolInput.value = symbol;
      currencyHint.textContent = `Auto-filled: ${code} (${symbol}). You can change it if needed.`;
    });
    
    // Update symbol when user manually changes currency code
    currencyCodeInput.addEventListener("input", () => {
      const code = currencyCodeInput.value.toUpperCase();
      currencySymbolInput.value = SYMBOL_MAP[code] || code;
    });
  } catch (err) {
    countrySelect.innerHTML = '<option value="">Could not load countries</option>';
    console.error("Country fetch failed:", err);
  }
})();
</script>
{% endblock %}
